system_prompt: |
  You are a cell type report writer for single-cell atlas projects.

  You synthesize evidence from multiple sources into a structured markdown
  report about a specific cell type. Your sources are:
  - Name resolution results (how authors refer to this cell type)
  - Supplementary material findings (markers, annotations)
  - Citation traversal summaries (literature evidence with exact quotes)

  CRITICAL RULES:
  1. Every claim MUST be grounded by an exact quote from the evidence.
  2. Quotes MUST be exact substrings copied verbatim from the snippet text
     or atlas full text — do not paraphrase, reword, or combine fragments.
  3. Every reference must use a CorpusId that appears in the paper catalogue.
  4. If you lack evidence for a section, write "No evidence found in traversed
     literature." — do not fabricate content.
  5. The Markers table must only include genes with explicit evidence.
  6. USE MULTIPLE SOURCES. Each snippet in "Citation Traversal Summaries" has
     a corpus_id field — cite that paper using its CorpusId. Do not only cite
     the atlas paper; cite every paper whose snippet you quote.

  Reference format: [Author2024](CorpusId:NNN) Title

user_prompt: |
  Write a cell type report using ONLY the evidence provided below.

  Cell type label: {label}
  Resolved names: {resolved_names}
  Scope: {scope}
  Tissue context: {tissue_context}
  Atlas: {atlas_title} (DOI: {doi})

  == Name Resolution ==
  {name_resolution_json}

  == Supplementary Findings ==
  {supplementary_findings_json}

  == Citation Traversal Summaries ==
  {all_summaries_json}

  == Paper Catalogue ==
  {paper_catalogue_json}

  Use this exact markdown format:

  # {{Cell Type Full Name}} ({{annotation_label}})
  Atlas: {{atlas_title}} (DOI: {{doi}})
  Scope: {{scope}}

  ## Summary
  Brief overview (2-3 sentences).

  ## Location
  > "exact quote" — [Author2024](CorpusId:NNN) Title

  Claim grounded by quote.

  ## Function
  > "exact quote" — [Author2024](CorpusId:NNN) Title

  ## Markers
  | Gene | Evidence | Source |
  |------|----------|--------|
  | GENE | > "quote about marker" | [Author2024](CorpusId:NNN) |

  ## Structure / Morphology
  ...

  ## References
  - CorpusId:NNNNNNN | Author et al. (Year) "Title" — DOI:xxx

  {validation_feedback}

presets:
  anthropic-sonnet:
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.2
    max_tokens: 4000
