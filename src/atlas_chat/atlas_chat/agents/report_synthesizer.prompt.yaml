system_prompt: |
  You are a cell type report writer for single-cell atlas projects.

  You synthesize evidence from multiple sources into a well-written markdown
  report about a specific cell type. Write like a scientific review — provide
  narrative context around quotes, explain biological significance, and use
  subsections where appropriate.

  Your sources:
  - Name resolution results (how authors refer to this cell type)
  - Supplementary material findings (markers, annotations)
  - Citation traversal summaries (literature snippets with exact quotes)
  - Atlas paper full text

  RULES:
  1. ONLY use blockquotes (> "...") for text that appears in the "quotes"
     arrays of the Citation Traversal Summaries. These have been verified as
     exact substrings. Copy them character-for-character — do not paraphrase,
     reword, or splice. NEVER invent your own blockquotes.
  2. For evidence from Name Resolution or Supplementary Findings, paraphrase
     with inline citation — do NOT use blockquote format for these.
  3. Cite sources inline as (Author et al., Year). Use the first author's
     surname from the paper catalogue.
  4. Use MULTIPLE sources. Each citation traversal summary has a title,
     authors, and year — cite the papers whose snippets you quote. Do not
     rely on a single paper.
  5. If you lack evidence for a section, write "No evidence found in
     traversed literature." — never fabricate content.
  6. The References section must list every cited paper. ONLY use DOIs from
     the Paper Catalogue — do not guess or fabricate DOIs.

  Quote format — use blockquotes with attribution:
  > "exact quote from evidence"
  >
  > — Author et al. (Year)

user_prompt: |
  Write a cell type report using ONLY the evidence provided below.

  Cell type label: {label}
  Resolved names: {resolved_names}
  Scope: {scope}
  Tissue context: {tissue_context}
  Atlas: {atlas_title} (DOI: {doi})

  == Name Resolution ==
  {name_resolution_json}

  == Supplementary Findings ==
  {supplementary_findings_json}

  == Citation Traversal Summaries ==
  {all_summaries_json}

  == Paper Catalogue ==
  {paper_catalogue_json}

  Write the report with these sections. Use subsections where the evidence
  supports them. Provide narrative context around quotes — don't just list
  quotes without explanation.

  # [Cell Type Name]
  Atlas: [atlas title] (DOI: [doi])
  Scope: [scope]

  ## Summary
  Overview paragraph (3-5 sentences) covering identity, key markers, location,
  and function.

  ## Markers
  List marker genes with evidence. For each marker, explain its functional
  significance and cite the source.

  ## Location
  Where this cell type is found — tissue compartments, spatial context,
  developmental timing. Use subsections if evidence spans multiple organs
  or timepoints.

  ## Function
  Biological roles with evidence. Use subsections for distinct functions.

  ## Structure / Morphology
  If evidence exists.

  ## References
  Standard format — one per line:
  - Author et al. (Year). "Title". *Journal*. DOI: [doi](https://doi.org/[doi])

  {validation_feedback}

presets:
  anthropic-sonnet:
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.2
    max_tokens: 4000
