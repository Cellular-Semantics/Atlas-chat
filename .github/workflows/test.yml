name: Tests
# Ring 0 defaults — run scripts/graduate-ring.py --to 1 when Ring 0 ships

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify uv installation
        run: |
          uv --version
          which uv

      - name: Install dependencies (workspace)
        run: |
          uv sync --dev --all-packages
          uv pip list

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format (check only)
        run: uv run ruff format --check src/ tests/

      - name: Unit tests with coverage
        run: uv run pytest -m unit --cov --cov-fail-under=60 --cov-report=xml

      - name: Integration tests (skipped)
        run: |
          echo "Integration tests are skipped in CI — run locally with real API keys before pushing."
          exit 0 # skip integration tests in CI
